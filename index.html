<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบลงทะเบียนอบรม สพป.ระยอง เขต 2</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Sarabun', sans-serif; background-color: #fdfaf6; }
    .animate-fade-in { animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes shimmer { 100% { transform: translateX(200%); } }
    
    /* Loading Spinner */
    .loader {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #f97316;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // 🔥 นำ URL ของ Google Apps Script มาใส่ตรงนี้ 🔥
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzPEVMd46E8CXJKPwOtsQe7j_u2plJDL2wX-X07sE6jS_yOG2pVgV8dFWqdM6qIj9bP/exec"; 

    const App = () => {
      const [currentView, setCurrentView] = useState('home');
      const [appData, setAppData] = useState([]);
      const [settings, setSettings] = useState(null);
      const [isInitializing, setIsInitializing] = useState(true);
      const [isProcessing, setIsProcessing] = useState(false);
      const [modalConfig, setModalConfig] = useState({ isOpen: false, message: '', type: 'error' });
      const [verifyModalOpen, setVerifyModalOpen] = useState(false);
      const [verifyPhoneInput, setVerifyPhoneInput] = useState('');
      const [verifyError, setVerifyError] = useState('');
      const [editingItem, setEditingItem] = useState(null);
      const [searchTerm, setSearchTerm] = useState('');

      // ดึงข้อมูลผ่าน Fetch API แทน google.script.run
      const fetchInitialData = async () => {
        setIsInitializing(true);
        try {
          const res = await fetch(GAS_API_URL);
          const response = await res.json();
          if (!response) throw new Error("ไม่สามารถอ่านข้อมูลได้");
          setSettings(response.settings);
          setAppData(response.users);
        } catch (error) {
          alert('เกิดข้อผิดพลาดในการโหลดข้อมูล: ' + error.message);
        }
        setIsInitializing(false);
      };

      useEffect(() => {
        fetchInitialData();
      }, []);

      const networkStats = {
        "กรมหลวงชุมพรฯ": appData.filter(d => d.network === "กรมหลวงชุมพรฯ").length,
        "แกลงบูรพา": appData.filter(d => d.network === "แกลงบูรพา").length,
        "เขาชะเมา": appData.filter(d => d.network === "เขาชะเมา").length,
        "วังจันทร์": appData.filter(d => d.network === "วังจันทร์").length,
        "สุนทรภู่": appData.filter(d => d.network === "สุนทรภู่").length,
        "อริยมงคล": appData.filter(d => d.network === "อริยมงคล").length
      };
      
      const currentTotal = appData.length;
      const targetTotal = settings?.targetRegister || 86;

      const renderLoadingOverlay = (message) => (
        <div className="fixed inset-0 z-[100] flex flex-col items-center justify-center p-4 bg-white/80 backdrop-blur-sm animate-fade-in">
          <div className="loader mb-4"></div>
          <p className="text-orange-600 font-bold text-xl">{message}</p>
        </div>
      );

      const renderCustomModal = () => {
        if (!modalConfig.isOpen) return null;
        return (
          <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-gray-900/40 backdrop-blur-sm animate-fade-in">
            <div className="bg-white rounded-3xl p-8 max-w-md w-full shadow-2xl transform transition-all text-center border border-gray-100">
              <div className={`w-24 h-24 mx-auto rounded-full flex items-center justify-center mb-6 shadow-inner ${modalConfig.type === 'error' ? 'bg-rose-100 text-rose-500' : 'bg-emerald-100 text-emerald-500'}`}>
                <span className="text-5xl">{modalConfig.type === 'error' ? '⚠️' : '✅'}</span>
              </div>
              <h3 className={`text-2xl font-extrabold mb-4 ${modalConfig.type === 'error' ? 'text-rose-600' : 'text-emerald-600'}`}>{modalConfig.type === 'error' ? 'แจ้งเตือน' : 'สำเร็จ'}</h3>
              <p className="text-gray-600 font-medium text-lg mb-8 leading-relaxed">{modalConfig.message}</p>
              <button 
                onClick={() => {
                  setModalConfig({ ...modalConfig, isOpen: false });
                  if (modalConfig.type === 'success') {
                    setCurrentView('home');
                    fetchInitialData();
                  }
                }}
                className={`w-full py-4 rounded-xl font-bold text-white shadow-lg transition-all hover:-translate-y-1 text-lg ${modalConfig.type === 'error' ? 'bg-gradient-to-r from-rose-500 to-pink-500 hover:shadow-rose-500/30' : 'bg-gradient-to-r from-teal-500 to-emerald-500 hover:shadow-teal-500/30'}`}
              >
                ตกลง
              </button>
            </div>
          </div>
        );
      };

      const renderVerifyPhoneModal = () => {
        if (!verifyModalOpen) return null;
        const handleVerify = () => {
          if (verifyPhoneInput === editingItem.phone) {
            setVerifyModalOpen(false); setVerifyError(''); setCurrentView('edit'); 
          } else {
            setVerifyError('❌ เบอร์โทรศัพท์ไม่ถูกต้อง กรุณาลองใหม่อีกครั้ง');
          }
        };
        return (
          <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-gray-900/40 backdrop-blur-sm animate-fade-in">
            <div className="bg-white rounded-3xl p-8 max-w-md w-full shadow-2xl transform transition-all border border-gray-100">
              <div className="text-center mb-6">
                <div className="w-20 h-20 mx-auto rounded-full bg-orange-100 text-orange-500 flex items-center justify-center mb-4 shadow-inner">
                  <span className="text-4xl">🔐</span>
                </div>
                <h3 className="text-2xl font-extrabold text-gray-800">ยืนยันตัวตน</h3>
                <p className="text-gray-500 font-medium mt-2">กรุณากรอกเบอร์โทรศัพท์ที่ใช้ลงทะเบียน เพื่อเข้าสู่โหมดแก้ไขข้อมูล</p>
              </div>
              <div className="mb-6">
                <input 
                  type="tel" maxLength="10" value={verifyPhoneInput}
                  onChange={(e) => { setVerifyPhoneInput(e.target.value); setVerifyError(''); }}
                  className={`w-full border-2 rounded-2xl p-4 text-center text-xl font-mono focus:outline-none focus:ring-4 transition-all ${verifyError ? 'border-rose-300 focus:ring-rose-500/20 focus:border-rose-500 bg-rose-50/30' : 'border-gray-200 focus:ring-orange-500/20 focus:border-orange-500 bg-gray-50/50'}`}
                  placeholder="08XXXXXXXX" autoFocus
                />
                {verifyError && <p className="text-rose-500 text-sm font-medium mt-3 text-center">{verifyError}</p>}
              </div>
              <div className="flex gap-3">
                <button onClick={() => { setVerifyModalOpen(false); setVerifyError(''); setEditingItem(null); }} className="flex-1 py-4 rounded-xl font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 transition-all">ยกเลิก</button>
                <button onClick={handleVerify} className="flex-1 py-4 rounded-xl font-bold text-white bg-gradient-to-r from-orange-500 to-rose-500 hover:shadow-lg hover:shadow-orange-500/30 transition-all hover:-translate-y-1">ตกลง</button>
              </div>
            </div>
          </div>
        );
      };

      const renderHeader = () => (
        <div className="bg-gradient-to-r from-amber-400 via-orange-500 to-rose-500 text-white shadow-xl shadow-orange-500/20 rounded-b-[2.5rem] mb-10 relative overflow-hidden">
          <div className="absolute top-0 right-0 w-64 h-64 bg-white opacity-10 rounded-full blur-3xl transform translate-x-1/2 -translate-y-1/2"></div>
          <div className="absolute bottom-0 left-0 w-48 h-48 bg-white opacity-10 rounded-full blur-2xl transform -translate-x-1/2 translate-y-1/2"></div>
          <div className="max-w-5xl mx-auto px-6 py-10 flex flex-col md:flex-row items-center text-center md:text-left gap-8 relative z-10">
            <div className="w-28 h-28 flex-shrink-0 transform hover:scale-105 transition-transform duration-300">
              <img src={settings?.logoUrl} alt="โลโก้" className="w-full h-full object-contain drop-shadow-lg" />
            </div>
            <div>
              <h1 className="text-2xl md:text-4xl font-extrabold leading-tight mb-3 drop-shadow-md tracking-wide">{settings?.mainTitle}</h1>
              <h2 className="text-lg md:text-xl font-medium text-orange-50 flex items-center justify-center md:justify-start gap-2 bg-white/10 w-fit px-5 py-2 rounded-full backdrop-blur-sm border border-white/20 mx-auto md:mx-0">
                📍 {settings?.subTitle}
              </h2>
            </div>
          </div>
        </div>
      );

      const renderFooter = () => (
        <div className="mt-16 bg-gradient-to-b from-orange-500 via-orange-100 to-white py-10 px-4 rounded-t-[2.5rem] shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.1)] border-t border-orange-300 relative overflow-hidden">
          <div className="absolute bottom-0 right-0 w-40 h-40 bg-orange-100 opacity-50 rounded-full blur-3xl transform translate-x-1/2 translate-y-1/2"></div>
          <div className="max-w-4xl mx-auto text-center space-y-2 text-sm md:text-base relative z-10">
            <p className="font-extrabold text-white text-xl md:text-2xl drop-shadow-md mb-3">งานสื่อ นวัตกรรม และเทคโนโลยีทางการศึกษา</p>
            <p className="font-bold text-orange-900 drop-shadow-sm">กลุ่มนิเทศ ติดตาม และประเมินผลการจัดการศึกษา</p>
            <p className="font-bold text-orange-900 drop-shadow-sm">สำนักงานเขตพื้นที่การศึกษาประถมศึกษาระยอง เขต 2</p>
            <div className="flex flex-wrap justify-center items-center gap-4 pt-6 font-medium">
              <span className="bg-white/90 backdrop-blur px-6 py-3 rounded-full shadow-md text-orange-700 border border-orange-200 flex items-center gap-2 hover:shadow-lg transition-shadow font-bold"><span className="text-xl">☎️</span> 038-671-180</span>
              <a href="https://ry2inno.blogspot.com" target="_blank" rel="noreferrer" className="bg-white/90 backdrop-blur px-6 py-3 rounded-full shadow-md text-blue-700 border border-blue-200 hover:bg-blue-50 hover:shadow-lg transition-all flex items-center gap-2 font-bold"><span className="text-xl">🌐</span> ry2inno.blogspot.com</a>
            </div>
          </div>
        </div>
      );

      const renderHomeView = () => {
        const percentage = Math.round((currentTotal / targetTotal) * 100);
        return (
          <div className="max-w-5xl mx-auto px-4 animate-fade-in">
            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10">
              <button onClick={() => setCurrentView('register')} className="group relative bg-white rounded-[2rem] p-8 shadow-lg hover:shadow-2xl hover:shadow-orange-500/20 transition-all duration-300 transform hover:-translate-y-2 flex flex-col items-center text-center border border-gray-50 overflow-hidden">
                <div className="absolute inset-0 bg-gradient-to-br from-orange-50 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                <div className="bg-gradient-to-br from-orange-100 to-orange-200 w-24 h-24 rounded-full flex items-center justify-center text-5xl mb-6 group-hover:scale-110 transition-transform duration-300 shadow-inner relative z-10">📝</div>
                <h3 className="text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-orange-600 to-orange-400 mb-2 relative z-10">ลงทะเบียนอบรม</h3>
                <p className="text-gray-500 font-medium relative z-10">คลิกเพื่อกรอกข้อมูลผู้เข้ารับการอบรม</p>
              </button>
              <button onClick={() => { setCurrentView('search'); setSearchTerm(''); }} className="group relative bg-white rounded-[2rem] p-8 shadow-lg hover:shadow-2xl hover:shadow-teal-500/20 transition-all duration-300 transform hover:-translate-y-2 flex flex-col items-center text-center border border-gray-50 overflow-hidden">
                <div className="absolute inset-0 bg-gradient-to-br from-teal-50 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                <div className="bg-gradient-to-br from-teal-100 to-teal-200 w-24 h-24 rounded-full flex items-center justify-center text-5xl mb-6 group-hover:scale-110 transition-transform duration-300 shadow-inner relative z-10">🔍</div>
                <h3 className="text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-teal-600 to-teal-400 mb-2 relative z-10">ตรวจสอบรายชื่อ/แก้ไขข้อมูล</h3>
                <p className="text-gray-500 font-medium relative z-10">ค้นหาข้อมูลผู้ลงทะเบียน และแก้ไขข้อมูลส่วนตัว</p>
              </button>
            </div>
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
              <div className="bg-white rounded-[2rem] p-8 shadow-lg shadow-gray-200/50 border border-gray-50 relative overflow-hidden group">
                <div className="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-amber-400 via-orange-500 to-rose-500 opacity-80 group-hover:opacity-100 transition-opacity"></div>
                <h3 className="text-lg font-bold text-gray-700 mb-6 flex items-center gap-3"><span className="bg-orange-100 p-2 rounded-xl text-xl">📊</span> ความคืบหน้าผู้ลงทะเบียน</h3>
                <div className="flex justify-between items-end mb-3">
                  <div className="flex items-baseline gap-2"><span className="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-500 to-rose-500 drop-shadow-sm">{currentTotal}</span><span className="text-gray-400 font-medium text-lg">/ {targetTotal} คน</span></div>
                </div>
                <div className="w-full bg-gray-100 rounded-full h-8 mb-3 overflow-hidden shadow-inner p-1 relative">
                  <div className="bg-gradient-to-r from-amber-400 via-orange-500 to-rose-500 h-full rounded-full transition-all duration-1000 flex items-center justify-end px-3 text-sm font-bold text-white shadow-md relative overflow-hidden" style={{ width: `${Math.min(100, percentage)}%` }}>
                    <div className="absolute inset-0 bg-white/20 w-1/2 skew-x-12 -translate-x-full animate-[shimmer_2s_infinite]"></div>{percentage}%
                  </div>
                </div>
                <p className="text-sm text-gray-400 flex items-center gap-2 mt-4 font-medium"><span className="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span> Realtime Update (โรงเรียนละ 1 คน)</p>
              </div>
              <div className="bg-white rounded-[2rem] p-8 shadow-lg shadow-gray-200/50 border border-gray-50 relative overflow-hidden group">
                 <div className="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-teal-400 to-emerald-500 opacity-80 group-hover:opacity-100 transition-opacity"></div>
                <h3 className="text-lg font-bold text-gray-700 mb-6 flex items-center gap-3"><span className="bg-teal-100 p-2 rounded-xl text-xl">🏫</span> แยกตามเครือข่ายการศึกษา</h3>
                <div className="space-y-4 relative z-10">
                  {Object.entries(networkStats).map(([network, count], index) => {
                    const barWidth = Math.max(0, (count / Math.max(1, (targetTotal/6))) * 100); 
                    return (
                      <div key={index} className="flex items-center text-sm group/item">
                        <span className="w-32 font-semibold text-gray-600 truncate group-hover/item:text-teal-600 transition-colors">{network}</span>
                        <div className="flex-1 ml-2 mr-4">
                          <div className="w-full bg-gray-100 rounded-full h-3.5 overflow-hidden"><div className="bg-gradient-to-r from-teal-400 to-emerald-400 h-full rounded-full group-hover/item:from-teal-500 group-hover/item:to-emerald-500 transition-colors" style={{ width: `${barWidth}%` }}></div></div>
                        </div>
                        <span className="w-8 text-right font-black text-gray-700 group-hover/item:text-teal-600">{count}</span>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          </div>
        );
      };

      const renderRegisterView = () => {
        const handleSubmit = async (e) => {
          e.preventDefault();
          const formElements = e.target.elements;
          const formData = {
            prefix: formElements.prefix.value,
            firstName: formElements.firstName.value.trim(),
            lastName: formElements.lastName.value.trim(),
            position: formElements.position.value,
            level: formElements.level.value,
            school: formElements.school.value.trim(),
            network: formElements.network.value,
            phone: formElements.phone.value.trim()
          };

          setIsProcessing(true);
          
          try {
            // ใช้ Fetch ส่งข้อมูลไปยัง GAS API
            const res = await fetch(GAS_API_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'text/plain;charset=utf-8' },
              body: JSON.stringify({ action: 'register', payload: formData })
            });
            const result = await res.json();
            setModalConfig({ isOpen: true, message: result.message, type: result.status });
          } catch (error) {
            setModalConfig({ isOpen: true, message: 'การเชื่อมต่อผิดพลาด: ' + error.message, type: 'error' });
          }
          setIsProcessing(false);
        };

        return (
          <div className="max-w-4xl mx-auto px-4 animate-fade-in">
            <button onClick={() => setCurrentView('home')} className="mb-6 text-orange-600 font-semibold flex items-center gap-2 hover:bg-orange-100 px-5 py-2.5 rounded-xl transition-all hover:-translate-x-1"><span className="text-xl">⬅️</span> กลับหน้าหลัก</button>
            <div className="bg-white rounded-[2rem] shadow-xl shadow-orange-500/10 border border-orange-50 overflow-hidden">
              <div className="bg-gradient-to-r from-amber-500 via-orange-500 to-rose-500 text-white p-8 text-center relative overflow-hidden">
                <h2 className="text-3xl font-extrabold mb-2 drop-shadow-md relative z-10">📝 ฟอร์มลงทะเบียนเข้ารับการอบรม</h2>
                <p className="text-orange-50 font-medium relative z-10">กรุณากรอกข้อมูลให้ครบถ้วนเพื่อประโยชน์ในการจัดทำเกียรติบัตร</p>
              </div>
              <form className="p-6 md:p-10 space-y-8" onSubmit={handleSubmit}>
                {/* คำนำหน้า ชื่อ นามสกุล */}
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                  <div className="col-span-1"><label className="block text-gray-700 font-bold mb-3">👤 คำนำหน้า <span className="text-rose-500">*</span></label><select name="prefix" className="w-full border-2 border-gray-100 bg-gray-50/50 rounded-2xl p-4 focus:border-orange-500 focus:bg-white focus:outline-none focus:ring-4 focus:ring-orange-500/10 transition-all" required><option value="">-- เลือก --</option><option value="นาย">นาย</option><option value="นาง">นาง</option><option value="นางสาว">นางสาว</option></select></div>
                  <div className="col-span-1 md:col-span-1"><label className="block text-gray-700 font-bold mb-3">ชื่อ <span className="text-rose-500">*</span></label><input type="text" name="firstName" className="w-full border-2 border-gray-100 bg-gray-50/50 rounded-2xl p-4 focus:border-orange-500 focus:bg-white focus:outline-none focus:ring-4 focus:ring-orange-500/10 transition-all" placeholder="ไม่ต้องใส่คำนำหน้า" required /></div>
                  <div className="col-span-1 md:col-span-1"><label className="block text-gray-700 font-bold mb-3">นามสกุล <span className="text-rose-500">*</span></label><input type="text" name="lastName" className="w-full border-2 border-gray-100 bg-gray-50/50 rounded-2xl p-4 focus:border-orange-500 focus:bg-white focus:outline-none focus:ring-4 focus:ring-orange-500/10 transition-all" required /></div>
                </div>
                {/* ตำแหน่ง วิทยฐานะ */}
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <div><label className="block text-gray-700 font-bold mb-3">💼 ตำแหน่ง <span className="text-rose-500">*</span></label><select name="position" className="w-full border-2 border-gray-100 bg-gray-50/50 rounded-2xl p-4 focus:border-orange-500 focus:bg-white focus:outline-none focus:ring-4 focus:ring-orange-500/10 transition-all" required><option value="">-- เลือกตำแหน่ง --</option><option value="ครูผู้ช่วย">ครูผู้ช่วย</option><option value="ครู">ครู</option></select></div>
                  <div><label className="block text-gray-700 font-bold mb-3">🏅 วิทยฐานะ <span className="text-rose-500">*</span></label><select name="level" className="w-full border-2 border-gray-100 bg-gray-50/50 rounded-2xl p-4 focus:border-orange-500 focus:bg-white focus:outline-none focus:ring-4 focus:ring-orange-500/10 transition-all" required><option value="">-- เลือกวิทยฐานะ --</option><option value="ไม่มี">ไม่มีวิทยฐานะ</option><option value="ชำนาญการ">ชำนาญการ</option><option value="ชำนาญการพิเศษ">ชำนาญการพิเศษ</option><option value="เชี่ยวชาญ">เชี่ยวชาญ</option></select></div>
                </div>
                {/* โรงเรียน เครือข่าย */}
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <div><label className="block text-gray-700 font-bold mb-3">🏫 โรงเรียน <span className="text-rose-500">*</span></label><input type="text" name="school" className="w-full border-2 border-gray-100 bg-gray-50/50 rounded-2xl p-4 focus:border-orange-500 focus:bg-white focus:outline-none focus:ring-4 focus:ring-orange-500/10 transition-all" placeholder="เช่น วังหว้า (ไม่ต้องใส่คำว่าโรงเรียน)" required /></div>
                  <div><label className="block text-gray-700 font-bold mb-3">🌐 เครือข่ายการศึกษา <span className="text-rose-500">*</span></label><select name="network" className="w-full border-2 border-gray-100 bg-gray-50/50 rounded-2xl p-4 focus:border-orange-500 focus:bg-white focus:outline-none focus:ring-4 focus:ring-orange-500/10 transition-all" required><option value="">-- เลือกเครือข่าย --</option><option value="กรมหลวงชุมพรฯ">กรมหลวงชุมพรฯ</option><option value="แกลงบูรพา">แกลงบูรพา</option><option value="เขาชะเมา">เขาชะเมา</option><option value="วังจันทร์">วังจันทร์</option><option value="สุนทรภู่">สุนทรภู่</option><option value="อริยมงคล">อริยมงคล</option></select></div>
                </div>
                {/* โทรศัพท์ */}
                <div><label className="block text-gray-700 font-bold mb-3">📱 เบอร์โทรศัพท์ <span className="text-rose-500">*</span></label><input type="tel" name="phone" maxLength="10" className="w-full border-2 border-gray-100 bg-gray-50/50 rounded-2xl p-4 focus:border-orange-500 focus:bg-white focus:outline-none focus:ring-4 focus:ring-orange-500/10 transition-all" placeholder="08XXXXXXXX" required /></div>
                <div className="pt-6"><button type="submit" className="w-full bg-gradient-to-r from-orange-500 via-rose-500 to-pink-500 hover:from-orange-600 hover:via-rose-600 hover:to-pink-600 text-white font-extrabold text-xl py-5 rounded-2xl shadow-xl shadow-rose-500/30 transform hover:-translate-y-1 transition-all relative overflow-hidden group"><span className="relative z-10 flex items-center justify-center gap-2">✅ ยืนยันการลงทะเบียนอบรม</span></button></div>
              </form>
            </div>
          </div>
        );
      };

      const renderEditView = () => {
        const handleUpdate = async (e) => {
          e.preventDefault();
          const formElements = e.target.elements;
          const formData = {
            prefix: formElements.prefix.value, firstName: formElements.firstName.value.trim(),
            lastName: formElements.lastName.value.trim(), position: formElements.position.value,
            level: formElements.level.value, school: formElements.school.value.trim(),
            network: formElements.network.value, phone: formElements.phone.value.trim()
          };

          setIsProcessing(true);
          try {
            const res = await fetch(GAS_API_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'text/plain;charset=utf-8' },
              body: JSON.stringify({ action: 'update', payload: formData, oldSchool: editingItem.school, oldPhone: editingItem.phone })
            });
            const result = await res.json();
            setModalConfig({ isOpen: true, message: result.message, type: result.status });
          } catch (error) {
            setModalConfig({ isOpen: true, message: 'การเชื่อมต่อผิดพลาด: ' + error.message, type: 'error' });
          }
          setIsProcessing(false);
        };

        if (!editingItem) return null;

        return (
          <div className="max-w-4xl mx-auto px-4 animate-fade-in">
            <button onClick={() => { setCurrentView('search'); setSearchTerm(''); }} className="mb-6 text-teal-600 font-semibold flex items-center gap-2 hover:bg-teal-50 px-5 py-2.5 rounded-xl transition-all hover:-translate-x-1"><span className="text-xl">⬅️</span> ย้อนกลับไปหน้าตรวจสอบรายชื่อ</button>
            <div className="bg-white rounded-[2rem] shadow-xl shadow-teal-500/10 border border-teal-50 overflow-hidden">
              <div className="bg-gradient-to-r from-teal-400 via-teal-500 to-emerald-500 text-white p-8 text-center relative overflow-hidden">
                <h2 className="text-3xl font-extrabold mb-2 drop-shadow-md relative z-10">🔧 แก้ไขข้อมูลการลงทะเบียน</h2>
                <p className="text-teal-50 font-medium relative z-10">คุณสามารถปรับปรุงข้อมูลให้ถูกต้องได้ที่นี่</p>
              </div>
              <form className="p-6 md:p-10 space-y-8" onSubmit={handleUpdate}>
                 <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                  <div className="col-span-1"><label className="block text-gray-700 font-bold mb-3">👤 คำนำหน้า <span className="text-rose-500">*</span></label><select name="prefix" defaultValue={editingItem.prefix} className="w-full border-2 border-gray-100 bg-gray-50/50 rounded-2xl p-4 focus:border-teal-500 focus:bg-white focus:outline-none focus:ring-4 transition-all" required><option value="">-- เลือก --</option><option value="นาย">นาย</option><option value="นาง">นาง</option><option value="นางสาว">นางสาว</option></select></div>
                  <div className="col-span-1 md:col-span-1"><label className="block text-gray-700 font-bold mb-3">ชื่อ <span className="text-rose-500">*</span></label><input type="text" name="firstName" defaultValue={editingItem.firstName} className="w-full border-2 border-gray-100 bg-gray-50/50 rounded-2xl p-4 focus:border-teal-500 focus:bg-white focus:outline-none focus:ring-4 transition-all" required /></div>
                  <div className="col-span-1 md:col-span-1"><label className="block text-gray-700 font-bold mb-3">นามสกุล <span className="text-rose-500">*</span></label><input type="text" name="lastName" defaultValue={editingItem.lastName} className="w-full border-2 border-gray-100 bg-gray-50/50 rounded-2xl p-4 focus:border-teal-500 focus:bg-white focus:outline-none focus:ring-4 transition-all" required /></div>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <div><label className="block text-gray-700 font-bold mb-3">💼 ตำแหน่ง <span className="text-rose-500">*</span></label><select name="position" defaultValue={editingItem.position} className="w-full border-2 border-gray-100 bg-gray-50/50 rounded-2xl p-4 focus:border-teal-500 focus:bg-white focus:outline-none focus:ring-4 transition-all" required><option value="ครูผู้ช่วย">ครูผู้ช่วย</option><option value="ครู">ครู</option></select></div>
                  <div><label className="block text-gray-700 font-bold mb-3">🏅 วิทยฐานะ <span className="text-rose-500">*</span></label><select name="level" defaultValue={editingItem.level} className="w-full border-2 border-gray-100 bg-gray-50/50 rounded-2xl p-4 focus:border-teal-500 focus:bg-white focus:outline-none focus:ring-4 transition-all" required><option value="ไม่มี">ไม่มีวิทยฐานะ</option><option value="ชำนาญการ">ชำนาญการ</option><option value="ชำนาญการพิเศษ">ชำนาญการพิเศษ</option><option value="เชี่ยวชาญ">เชี่ยวชาญ</option></select></div>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <div><label className="block text-gray-700 font-bold mb-3">🏫 โรงเรียน <span className="text-rose-500">*</span></label><input type="text" name="school" defaultValue={editingItem.school} className="w-full border-2 border-gray-100 bg-gray-50/50 rounded-2xl p-4 focus:border-teal-500 focus:bg-white focus:outline-none focus:ring-4 transition-all" required /></div>
                  <div><label className="block text-gray-700 font-bold mb-3">🌐 เครือข่ายการศึกษา <span className="text-rose-500">*</span></label><select name="network" defaultValue={editingItem.network} className="w-full border-2 border-gray-100 bg-gray-50/50 rounded-2xl p-4 focus:border-teal-500 focus:bg-white focus:outline-none focus:ring-4 transition-all" required><option value="กรมหลวงชุมพรฯ">กรมหลวงชุมพรฯ</option><option value="แกลงบูรพา">แกลงบูรพา</option><option value="เขาชะเมา">เขาชะเมา</option><option value="วังจันทร์">วังจันทร์</option><option value="สุนทรภู่">สุนทรภู่</option><option value="อริยมงคล">อริยมงคล</option></select></div>
                </div>
                <div><label className="block text-gray-700 font-bold mb-3">📱 เบอร์โทรศัพท์ <span className="text-rose-500">*</span></label><input type="tel" name="phone" defaultValue={editingItem.phone} maxLength="10" className="w-full border-2 border-gray-100 bg-gray-50/50 rounded-2xl p-4 focus:border-teal-500 focus:bg-white focus:outline-none focus:ring-4 transition-all" required /></div>
                <div className="pt-6"><button type="submit" className="w-full bg-gradient-to-r from-teal-500 via-emerald-500 to-teal-400 hover:from-teal-600 hover:via-emerald-600 hover:to-teal-500 text-white font-extrabold text-xl py-5 rounded-2xl shadow-xl shadow-teal-500/30 transform hover:-translate-y-1 transition-all relative overflow-hidden group"><span className="relative z-10 flex items-center justify-center gap-2">💾 บันทึกการแก้ไขข้อมูล</span></button></div>
              </form>
            </div>
          </div>
        );
      };

      const renderSearchView = () => {
        const filteredData = appData.filter(item => item.school.includes(searchTerm) || item.phone.includes(searchTerm));
        const handleEditClick = (item) => { setEditingItem(item); setVerifyPhoneInput(''); setVerifyError(''); setVerifyModalOpen(true); };

        return (
          <div className="max-w-4xl mx-auto px-4 animate-fade-in">
             <button onClick={() => setCurrentView('home')} className="mb-6 text-teal-600 font-semibold flex items-center gap-2 hover:bg-teal-50 px-5 py-2.5 rounded-xl transition-all hover:-translate-x-1"><span className="text-xl">⬅️</span> กลับหน้าหลัก</button>
            <div className="bg-white rounded-[2rem] shadow-xl shadow-teal-500/10 border border-teal-50 p-6 md:p-10 relative overflow-hidden">
              <div className="text-center mb-10 relative z-10">
                <div className="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-br from-teal-100 to-emerald-100 rounded-full mb-4 shadow-inner"><span className="text-4xl">🔍</span></div>
                <h2 className="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-teal-700 to-emerald-500 mb-3">ตรวจสอบรายชื่อ / แก้ไขข้อมูล</h2>
                <p className="text-gray-500 font-medium">ค้นหาได้จาก "ชื่อโรงเรียน" หรือ "เบอร์โทรศัพท์"</p>
              </div>
              <div className="relative mb-10 max-w-xl mx-auto z-10 group">
                <div className="absolute inset-y-0 left-0 pl-6 flex items-center pointer-events-none transition-transform group-focus-within:scale-110"><span className="text-2xl drop-shadow-sm">🔎</span></div>
                <input type="text" className="block w-full pl-16 pr-6 py-4 bg-gray-50/50 border-2 border-teal-100 rounded-full focus:bg-white focus:ring-4 focus:ring-teal-500/20 focus:border-teal-400 text-gray-800 placeholder-gray-400 text-lg font-medium transition-all shadow-sm hover:shadow-md" placeholder="พิมพ์ชื่อโรงเรียน หรือ เบอร์โทร..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
              </div>
              <div className="overflow-x-auto rounded-2xl border border-gray-100 shadow-sm relative z-10">
                <table className="w-full text-left text-sm md:text-base border-collapse">
                  <thead className="bg-gradient-to-r from-teal-50 to-emerald-50 text-teal-800">
                    <tr>
                      <th className="px-6 py-4 border-b border-teal-100/50 font-bold">🏫 โรงเรียน</th><th className="px-6 py-4 border-b border-teal-100/50 font-bold hidden md:table-cell">🌐 เครือข่าย</th><th className="px-6 py-4 border-b border-teal-100/50 font-bold">💼 ตำแหน่ง</th><th className="px-6 py-4 border-b border-teal-100/50 font-bold">📱 เบอร์โทรศัพท์</th><th className="px-6 py-4 border-b border-teal-100/50 font-bold text-center">แก้ไข</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-gray-50 bg-white">
                    {searchTerm === '' ? (<tr><td colSpan="5" className="px-6 py-12 text-center text-gray-400 bg-gray-50/50 font-medium"><div className="text-4xl mb-3 opacity-50">⌨️</div>กรุณาพิมพ์เพื่อค้นหา...</td></tr>) : filteredData.length > 0 ? (filteredData.map((data, index) => (
                        <tr key={index} className="hover:bg-teal-50/50 transition-colors">
                          <td className="px-6 py-4 font-bold text-gray-700">{data.school}</td><td className="px-6 py-4 text-gray-600 font-medium hidden md:table-cell">{data.network}</td><td className="px-6 py-4 text-gray-600"><span className="bg-white border border-gray-200 shadow-sm text-gray-700 font-medium px-3 py-1.5 rounded-lg text-sm">{data.position}</span></td><td className="px-6 py-4 text-gray-600 font-mono font-medium tracking-wide">{data.phone && data.phone.length >= 5 ? `xxxxx${data.phone.substring(5)}` : data.phone}</td>
                          <td className="px-6 py-4 text-center"><button onClick={() => handleEditClick(data)} title="แก้ไขข้อมูล" className="bg-orange-100 hover:bg-orange-500 text-orange-600 hover:text-white w-10 h-10 rounded-full flex items-center justify-center transition-all shadow-sm mx-auto group/btn"><span className="group-hover/btn:scale-110 transition-transform">🔧</span></button></td>
                        </tr>
                      ))) : (<tr><td colSpan="5" className="px-6 py-12 text-center text-rose-400 bg-rose-50/50 font-medium"><div className="text-4xl mb-3">❌</div>ไม่พบข้อมูลที่ค้นหา</td></tr>)}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen bg-[#fdfaf6] font-sans relative">
          {isInitializing && renderLoadingOverlay("กำลังเชื่อมต่อฐานข้อมูล...")}
          {isProcessing && renderLoadingOverlay("กำลังบันทึกข้อมูล...")}
          {renderCustomModal()}
          {renderVerifyPhoneModal()}
          {renderHeader()}
          <main className="pb-12 min-h-[50vh]">
            {!isInitializing && currentView === 'home' && renderHomeView()}
            {!isInitializing && currentView === 'register' && renderRegisterView()}
            {!isInitializing && currentView === 'search' && renderSearchView()}
            {!isInitializing && currentView === 'edit' && renderEditView()}
          </main>
          {renderFooter()}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
