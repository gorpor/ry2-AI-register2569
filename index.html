<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบลงทะเบียนอบรม สพป.ระยอง เขต 2</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Sarabun', sans-serif; background-color: #fdfaf6; }
    .animate-fade-in { animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes shimmer { 100% { transform: translateX(200%); } }
    .loader {
      border: 4px solid #f3f3f3; border-top: 4px solid #f97316;
      border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // 🔥 นำ URL ของ Google Apps Script อันใหม่มาใส่ตรงนี้ 🔥
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbxfOerUVHvZgdLHY7I5wMI6la9zA4PdmP_UGsXp8sh3hLPxxnyuxpXHsBess-CUucdU/exec"; 

    const App = () => {
      const [currentView, setCurrentView] = useState('home');
      const [appData, setAppData] = useState([]);
      const [settings, setSettings] = useState(null);
      const [isInitializing, setIsInitializing] = useState(true);
      const [isProcessing, setIsProcessing] = useState(false);
      const [modalConfig, setModalConfig] = useState({ isOpen: false, message: '', type: 'error' });
      const [verifyModalOpen, setVerifyModalOpen] = useState(false);
      const [verifyPhoneInput, setVerifyPhoneInput] = useState('');
      const [verifyError, setVerifyError] = useState('');
      const [editingItem, setEditingItem] = useState(null);
      const [searchTerm, setSearchTerm] = useState('');

      const fetchInitialData = async () => {
        setIsInitializing(true);
        try {
          const res = await fetch(GAS_API_URL);
          const response = await res.json();
          if (!response) throw new Error("ไม่สามารถอ่านข้อมูลได้");
          setSettings(response.settings);
          setAppData(response.users);
        } catch (error) {
          alert('เกิดข้อผิดพลาดในการโหลดข้อมูล: ' + error.message);
        }
        setIsInitializing(false);
      };

      useEffect(() => { fetchInitialData(); }, []);

      const networkStats = {
        "กรมหลวงชุมพรฯ": appData.filter(d => d.network === "กรมหลวงชุมพรฯ").length,
        "แกลงบูรพา": appData.filter(d => d.network === "แกลงบูรพา").length,
        "เขาชะเมา": appData.filter(d => d.network === "เขาชะเมา").length,
        "วังจันทร์": appData.filter(d => d.network === "วังจันทร์").length,
        "สุนทรภู่": appData.filter(d => d.network === "สุนทรภู่").length,
        "อริยมงคล": appData.filter(d => d.network === "อริยมงคล").length
      };
      
      const currentTotal = appData.length;
      const targetTotal = settings?.targetRegister || 86;

      const renderLoadingOverlay = (message) => (
        <div className="fixed inset-0 z-[100] flex flex-col items-center justify-center p-4 bg-white/80 backdrop-blur-sm animate-fade-in">
          <div className="loader mb-4"></div><p className="text-orange-600 font-bold text-xl">{message}</p>
        </div>
      );

      const renderCustomModal = () => {
        if (!modalConfig.isOpen) return null;
        return (
          <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-gray-900/40 backdrop-blur-sm animate-fade-in">
            <div className="bg-white rounded-3xl p-8 max-w-md w-full shadow-2xl transform transition-all text-center border border-gray-100">
              <div className={`w-24 h-24 mx-auto rounded-full flex items-center justify-center mb-6 shadow-inner ${modalConfig.type === 'error' ? 'bg-rose-100 text-rose-500' : 'bg-emerald-100 text-emerald-500'}`}><span className="text-5xl">{modalConfig.type === 'error' ? '⚠️' : '✅'}</span></div>
              <h3 className={`text-2xl font-extrabold mb-4 ${modalConfig.type === 'error' ? 'text-rose-600' : 'text-emerald-600'}`}>{modalConfig.type === 'error' ? 'แจ้งเตือน' : 'สำเร็จ'}</h3>
              <p className="text-gray-600 font-medium text-lg mb-8 leading-relaxed">{modalConfig.message}</p>
              <button onClick={() => { setModalConfig({ ...modalConfig, isOpen: false }); if (modalConfig.type === 'success') { setCurrentView('home'); fetchInitialData(); } }} className={`w-full py-4 rounded-xl font-bold text-white shadow-lg transition-all hover:-translate-y-1 text-lg ${modalConfig.type === 'error' ? 'bg-gradient-to-r from-rose-500 to-pink-500 hover:shadow-rose-500/30' : 'bg-gradient-to-r from-teal-500 to-emerald-500 hover:shadow-teal-500/30'}`}>ตกลง</button>
            </div>
          </div>
        );
      };

      const renderVerifyPhoneModal = () => {
        if (!verifyModalOpen) return null;
        const handleVerify = async () => {
          setIsProcessing(true);
          try {
            const res = await fetch(GAS_API_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'text/plain;charset=utf-8' },
              body: JSON.stringify({ action: 'verify', school: editingItem.school, phone: verifyPhoneInput })
            });
            const result = await res.json();
            if (result.status === 'success') {
              setEditingItem(result.data); // รับข้อมูลเต็มๆ มาเพื่อแก้ไข
              setVerifyModalOpen(false);
              setVerifyError('');
              setCurrentView('edit'); 
            } else {
              setVerifyError(result.message);
            }
          } catch (error) {
            setVerifyError('การเชื่อมต่อขัดข้อง กรุณาลองใหม่');
          }
          setIsProcessing(false);
        };
        return (
          <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-gray-900/40 backdrop-blur-sm animate-fade-in">
            <div className="bg-white rounded-3xl p-8 max-w-md w-full shadow-2xl transform transition-all border border-gray-100">
              <div className="text-center mb-6"><div className="w-20 h-20 mx-auto rounded-full bg-orange-100 text-orange-500 flex items-center justify-center mb-4 shadow-inner"><span className="text-4xl">🔐</span></div><h3 className="text-2xl font-extrabold text-gray-800">ยืนยันตัวตน</h3><p className="text-gray-500 font-medium mt-2">กรุณากรอกเบอร์โทรศัพท์ที่ใช้ลงทะเบียน เพื่อเข้าสู่โหมดแก้ไขข้อมูลของท่าน</p></div>
              <div className="mb-6">
                <input type="tel" maxLength="10" value={verifyPhoneInput} onChange={(e) => { setVerifyPhoneInput(e.target.value); setVerifyError(''); }} className={`w-full border-2 rounded-2xl p-4 text-center text-xl font-mono focus:outline-none focus:ring-4 transition-all ${verifyError ? 'border-rose-300 focus:ring-rose-500/20 focus:border-rose-500 bg-rose-50/30' : 'border-gray-200 focus:ring-orange-500/20 focus:border-orange-500 bg-gray-50/50'}`} placeholder="08XXXXXXXX" autoFocus />
                {verifyError && <p className="text-rose-500 text-sm font-medium mt-3 text-center">{verifyError}</p>}
              </div>
              <div className="flex gap-3"><button onClick={() => { setVerifyModalOpen(false); setVerifyError(''); setEditingItem(null); }} className="flex-1 py-4 rounded-xl font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 transition-all">ยกเลิก</button><button onClick={handleVerify} className="flex-1 py-4 rounded-xl font-bold text-white bg-gradient-to-r from-orange-500 to-rose-500 hover:shadow-lg hover:shadow-orange-500/30 transition-all hover:-translate-y-1">ตกลง</button></div>
            </div>
          </div>
        );
      };

      const renderHeader = () => (
        <div className="bg-gradient-to-r from-amber-400 via-orange-500 to-rose-500 text-white shadow-xl shadow-orange-500/20 rounded-b-[2.5rem] mb-10 relative overflow-hidden">
          <div className="absolute top-0 right-0 w-64 h-64 bg-white opacity-10 rounded-full blur-3xl transform translate-x-1/2 -translate-y-1/2"></div>
          <div className="absolute bottom-0 left-0 w-48 h-48 bg-white opacity-10 rounded-full blur-2xl transform -translate-x-1/2 translate-y-1/2"></div>
          <div className="max-w-5xl mx-auto px-6 py-10 flex flex-col md:flex-row items-center text-center md:text-left gap-8 relative z-10">
            <div className="w-28 h-28 flex-shrink-0 transform hover:scale-105 transition-transform duration-300"><img src={settings?.logoUrl} alt="โลโก้" className="w-full h-full object-contain drop-shadow-lg" /></div>
            <div>
              <h1 className="text-2xl md:text-4xl font-extrabold leading-tight mb-3 drop-shadow-md tracking-wide">{settings?.mainTitle}</h1>
              <h2 className="text-lg md:text-xl font-medium text-orange-50 flex items-center justify-center md:justify-start gap-2 bg-white/10 w-fit px-5 py-2 rounded-full backdrop-blur-sm border border-white/20 mx-auto md:mx-0">📍 {settings?.subTitle}</h2>
            </div>
          </div>
        </div>
      );

const renderFooter = () => (
        <div className="mt-16 bg-gradient-to-b from-orange-500 via-orange-100 to-white py-10 px-4 rounded-t-[2.5rem] shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.1)] border-t border-orange-300 relative overflow-hidden">
          <div className="absolute bottom-0 right-0 w-40 h-40 bg-orange-100 opacity-50 rounded-full blur-3xl transform translate-x-1/2 translate-y-1/2"></div>
          <div className="max-w-4xl mx-auto text-center space-y-2 text-sm md:text-base relative z-10">
            <p className="font-extrabold text-white text-xl md:text-2xl drop-shadow-md mb-3">งานสื่อ นวัตกรรม และเทคโนโลยีทางการศึกษา</p>
            <p className="font-bold text-orange-900 drop-shadow-sm">กลุ่มนิเทศ ติดตาม และประเมินผลการจัดการศึกษา</p>
            <p className="font-bold text-orange-900 drop-shadow-sm">สำนักงานเขตพื้นที่การศึกษาประถมศึกษาระยอง เขต 2</p>
            
            {/* ส่วนที่เพิ่มกลับเข้ามา: เบอร์โทร และ เว็บไซต์ */}
            <div className="flex flex-wrap justify-center items-center gap-4 pt-6 font-medium">
              <span className="bg-white/90 backdrop-blur px-6 py-3 rounded-full shadow-md text-orange-700 border border-orange-200 flex items-center gap-2 hover:shadow-lg transition-shadow font-bold">
                <span className="text-xl">☎️</span> 038-671-180
              </span>
              <a href="https://ry2inno.blogspot.com" target="_blank" rel="noreferrer" className="bg-white/90 backdrop-blur px-6 py-3 rounded-full shadow-md text-blue-700 border border-blue-200 hover:bg-blue-50 hover:shadow-lg transition-all flex items-center gap-2 font-bold">
                <span className="text-xl">🌐</span> ry2inno.blogspot.com
              </a>
            </div>
            
          </div>
        </div>
      );

      const renderHomeView = () => {
        const percentage = Math.round((currentTotal / targetTotal) * 100);
        return (
          <div className="max-w-5xl mx-auto px-4 animate-fade-in">
            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10">
              <button onClick={() => setCurrentView('register')} className="group relative bg-white rounded-[2rem] p-8 shadow-lg hover:shadow-2xl hover:shadow-orange-500/20 transition-all duration-300 transform hover:-translate-y-2 flex flex-col items-center text-center border border-gray-50 overflow-hidden">
                <div className="absolute inset-0 bg-gradient-to-br from-orange-50 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div><div className="bg-gradient-to-br from-orange-100 to-orange-200 w-24 h-24 rounded-full flex items-center justify-center text-5xl mb-6 group-hover:scale-110 transition-transform duration-300 shadow-inner relative z-10">📝</div><h3 className="text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-orange-600 to-orange-400 mb-2 relative z-10">ลงทะเบียนอบรม</h3><p className="text-gray-500 font-medium relative z-10">คลิกเพื่อกรอกข้อมูลผู้เข้ารับการอบรม</p>
              </button>
              <button onClick={() => { setCurrentView('search'); setSearchTerm(''); }} className="group relative bg-white rounded-[2rem] p-8 shadow-lg hover:shadow-2xl hover:shadow-teal-500/20 transition-all duration-300 transform hover:-translate-y-2 flex flex-col items-center text-center border border-gray-50 overflow-hidden">
                <div className="absolute inset-0 bg-gradient-to-br from-teal-50 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div><div className="bg-gradient-to-br from-teal-100 to-teal-200 w-24 h-24 rounded-full flex items-center justify-center text-5xl mb-6 group-hover:scale-110 transition-transform duration-300 shadow-inner relative z-10">🔍</div><h3 className="text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-teal-600 to-teal-400 mb-2 relative z-10">ตรวจสอบรายชื่อ/แก้ไขข้อมูล</h3><p className="text-gray-500 font-medium relative z-10">ค้นหาข้อมูลผู้ลงทะเบียน และแก้ไขข้อมูลส่วนตัว</p>
              </button>
            </div>
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
              <div className="bg-white rounded-[2rem] p-8 shadow-lg shadow-gray-200/50 border border-gray-50 relative overflow-hidden group">
                <div className="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-amber-400 via-orange-500 to-rose-500 opacity-80 group-hover:opacity-100 transition-opacity"></div>
                <h3 className="text-lg font-bold text-gray-700 mb-6 flex items-center gap-3"><span className="bg-orange-100 p-2 rounded-xl text-xl">📊</span> ความคืบหน้าผู้ลงทะเบียน</h3>
                <div className="flex justify-between items-end mb-3"><div className="flex items-baseline gap-2"><span className="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-500 to-rose-500 drop-shadow-sm">{currentTotal}</span><span className="text-gray-400 font-medium text-lg">/ {targetTotal} คน</span></div></div>
                <div className="w-full bg-gray-100 rounded-full h-8 mb-3 overflow-hidden shadow-inner p-1 relative"><div className="bg-gradient-to-r from-amber-400 via-orange-500 to-rose-500 h-full rounded-full transition-all duration-1000 flex items-center justify-end px-3 text-sm font-bold text-white shadow-md relative overflow-hidden" style={{ width: `${Math.min(100, percentage)}%` }}><div className="absolute inset-0 bg-white/20 w-1/2 skew-x-12 -translate-x-full animate-[shimmer_2s_infinite]"></div>{percentage}%</div></div>
              </div>
              <div className="bg-white rounded-[2rem] p-8 shadow-lg shadow-gray-200/50 border border-gray-50 relative overflow-hidden group">
                 <div className="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-teal-400 to-emerald-500 opacity-80 group-hover:opacity-100 transition-opacity"></div>
                <h3 className="text-lg font-bold text-gray-700 mb-6 flex items-center gap-3"><span className="bg-teal-100 p-2 rounded-xl text-xl">🏫</span> แยกตามเครือข่ายการศึกษา</h3>
                <div className="space-y-4 relative z-10">
                  {Object.entries(networkStats).map(([network, count], index) => {
                    const barWidth = Math.max(0, (count / Math.max(1, (targetTotal/6))) * 100); 
                    return (
                      <div key={index} className="flex items-center text-sm group/item"><span className="w-32 font-semibold text-gray-600 truncate group-hover/item:text-teal-600 transition-colors">{network}</span><div className="flex-1 ml-2 mr-4"><div className="w-full bg-gray-100 rounded-full h-3.5 overflow-hidden"><div className="bg-gradient-to-r from-teal-400 to-emerald-400 h-full rounded-full group-hover/item:from-teal-500 group-hover/item:to-emerald-500 transition-colors" style={{ width: `${barWidth}%` }}></div></div></div><span className="w-8 text-right font-black text-gray-700 group-hover/item:text-teal-600">{count}</span></div>
                    );
                  })}
                </div>
              </div>
            </div>
          </div>
        );
      };

      const renderRegisterView = () => {
        const handleSubmit = async (e) => {
          e.preventDefault();
          const formElements = e.target.elements;
          const formData = {
            prefix: formElements.prefix.value, firstName: formElements.firstName.value.trim(), lastName: formElements.lastName.value.trim(),
            position: formElements.position.value, level: formElements.level.value, school: formElements.school.value.trim(),
            network: formElements.network.value, phone: formElements.phone.value.trim()
          };

          setIsProcessing(true);
          try {
            const res = await fetch(GAS_API_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action: 'register', payload: formData }) });
            const result = await res.json();
            setModalConfig({ isOpen: true, message: result.message, type: result.status });
          } catch (error) { setModalConfig({ isOpen: true, message: 'การเชื่อมต่อผิดพลาด: ' + error.message, type: 'error' }); }
          setIsProcessing(false);
        };

        return (
          <div className="max-w-4xl mx-auto px-4 animate-fade-in">
            <button onClick={() => setCurrentView('home')} className="mb-6 text-orange-600 font-semibold flex items-center gap-2 hover:bg-orange-100 px-5 py-2.5 rounded-xl transition-all hover:-translate-x-1"><span className="text-xl">⬅️</span> กลับหน้าหลัก</button>
            <div className="bg-white rounded-[2rem] shadow-xl shadow-orange-500/10 border border-orange-50 overflow-hidden">
              <div className="bg-gradient-to-r from-amber-500 via-orange-500 to-rose-500 text-white p-8 text-center relative overflow-hidden"><h2 className="text-3xl font-extrabold mb-2 drop-shadow-md relative z-10">📝 ฟอร์มลงทะเบียนเข้ารับการอบรม</h2><p className="text-orange-50 font-medium relative z-10">กรุณากรอกข้อมูลให้ครบถ้วนเพื่อประโยชน์ในการจัดทำเกียรติบัตร</p></div>
              <form className="p-6 md:p-10 space-y-8" onSubmit={handleSubmit}>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                  <div className="col-span-1"><label className="block text-gray-700 font-bold mb-3">👤 คำนำหน้า <span className="text-rose-500">*</span></label><select name="prefix" className="w-full border-2 border-gray-100 bg-gray-50/50 rounded-2xl p-4 focus:border-orange-500 focus:bg-white focus:outline-none focus:ring-4 transition-all" required><option value="">-- เลือก --</option><option value="นาย">นาย</option><option value="นาง">นาง</option><option value="นางสาว">นางสาว</option></select></div>
                  <div className="col-span-1 md:col-span-1"><label className="block text-gray-700 font-bold mb-3">ชื่อ <span className="text-rose-500">*</span></label><input type="text" name="firstName" className="w-full border-2 border-gray-100 bg-gray-50/50 rounded-2xl p-4 focus:border-orange-500 focus:bg-white focus:outline-none focus:ring-4 transition-all" placeholder="ไม่ต้องใส่คำนำหน้า" required /></div>
                  <div className="col-span-1 md:col-span-1"><label className="block text-gray-700 font-bold mb-3">นามสกุล <span className="text-rose-500">*</span></label><input type="text" name="lastName" className="w-full border-2 border-gray-100 bg-gray-50/50 rounded-2xl p-4 focus:border-orange-500 focus:bg-white focus:outline-none focus:ring-4 transition-all" required /></div>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <div><label className="block text-gray-700 font-bold mb-3">💼 ตำแหน่ง <span className="text-rose-500">*</span></label><select name="position" className="w-full border-2 border-gray-100 bg-gray-50/50 rounded-2xl p-4 focus:border-orange-500 focus:bg-white focus:outline-none focus:ring-4 transition-all" required><option value="">-- เลือกตำแหน่ง --</option><option value="ครูผู้ช่วย">ครูผู้ช่วย</option><option value="ครู">ครู</option></select></div>
                  <div><label className="block text-gray-700 font-bold mb-3">🏅 วิทยฐานะ <span className="text-rose-500">*</span></label><select name="level" className="w-full border-2 border-gray-100 bg-gray-50/50 rounded-2xl p-4 focus:border-orange-500 focus:bg-white focus:outline-none focus:ring-4 transition-all" required><option value="">-- เลือกวิทยฐานะ --</option><option value="ไม่มี">ไม่มีวิทยฐานะ</option><option value="ชำนาญการ">ชำนาญการ</option><option value="ชำนาญการพิเศษ">ชำนาญการพิเศษ</option><option value="เชี่ยวชาญ">เชี่ยวชาญ</option></select></div>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <div><label className="block text-gray-700 font-bold mb-3">🏫 โรงเรียน <span className="text-rose-500">*</span></label><input type="text" name="school" className="w-full border-2 border-gray-100 bg-gray-50/50 rounded-2xl p-4 focus:border-orange-500 focus:bg-white focus:outline-none focus:ring-4 transition-all" placeholder="เช่น วังหว้า (ไม่ต้องใส่คำว่าโรงเรียน)" required /></div>
                  <div><label className="block text-gray-700 font-bold mb-3">🌐 เครือข่ายการศึกษา <span className="text-rose-500">*</span></label><select name="network" className="w-full border-2 border-gray-100 bg-gray-50/50 rounded-2xl p-4 focus:border-orange-500 focus:bg-white focus:outline-none focus:ring-4 transition-all" required><option value="">-- เลือกเครือข่าย --</option><option value="กรมหลวงชุมพรฯ">กรมหลวงชุมพรฯ</option><option value="แกลงบูรพา">แกลงบูรพา</option><option value="เขาชะเมา">เขาชะเมา</option><option value="วังจันทร์">วังจันทร์</option><option value="สุนทรภู่">สุนทรภู่</option><option value="อริยมงคล">อริยมงคล</option></select></div>
                </div>
                <div><label className="block text-gray-700 font-bold mb-3">📱 เบอร์โทรศัพท์ <span className="text-rose-500">*</span></label><input type="tel" name="phone" maxLength="10" className="w-full border-2 border-gray-100 bg-gray-50/50 rounded-2xl p-4 focus:border-orange-500 focus:bg-white focus:outline-none focus:ring-4 transition-all" placeholder="08XXXXXXXX" required /></div>
                <div className="pt-6"><button type="submit" className="w-full bg-gradient-to-r from-orange-500 via-rose-500 to-pink-500 hover:from-orange-600 hover:-translate-y-1 text-white font-extrabold text-xl py-5 rounded-2xl shadow-xl transition-all"><span className="relative z-10">✅ ยืนยันการลงทะเบียนอบรม</span></button></div>
              </form>
            </div>
          </div>
        );
      };

      const renderEditView = () => {
        const handleUpdate = async (e) => {
          e.preventDefault();
          const formElements = e.target.elements;
          const formData = {
            prefix: formElements.prefix.value, firstName: formElements.firstName.value.trim(), lastName: formElements.lastName.value.trim(),
            position: formElements.position.value, level: formElements.level.value, school: formElements.school.value.trim(),
            network: formElements.network.value, phone: formElements.phone.value.trim()
          };
          setIsProcessing(true);
          try {
            const res = await fetch(GAS_API_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action: 'update', payload: formData, oldSchool: editingItem.school, oldPhone: editingItem.phone }) });
            const result = await res.json();
            setModalConfig({ isOpen: true, message: result.message, type: result.status });
          } catch (error) { setModalConfig({ isOpen: true, message: 'การเชื่อมต่อผิดพลาด', type: 'error' }); }
          setIsProcessing(false);
        };
        if (!editingItem) return null;
        return (
          <div className="max-w-4xl mx-auto px-4 animate-fade-in">
            <button onClick={() => { setCurrentView('search'); setSearchTerm(''); }} className="mb-6 text-teal-600 font-semibold flex items-center gap-2 hover:bg-teal-50 px-5 py-2.5 rounded-xl"><span className="text-xl">⬅️</span> ย้อนกลับ</button>
            <div className="bg-white rounded-[2rem] shadow-xl border border-teal-50 overflow-hidden">
              <div className="bg-gradient-to-r from-teal-400 to-emerald-500 text-white p-8 text-center"><h2 className="text-3xl font-extrabold mb-2">🔧 แก้ไขข้อมูลการลงทะเบียน</h2></div>
              <form className="p-6 md:p-10 space-y-8" onSubmit={handleUpdate}>
                 <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                  <div className="col-span-1"><label className="block text-gray-700 font-bold mb-3">👤 คำนำหน้า <span className="text-rose-500">*</span></label><select name="prefix" defaultValue={editingItem.prefix} className="w-full border-2 border-gray-100 bg-gray-50/50 rounded-2xl p-4" required><option value="นาย">นาย</option><option value="นาง">นาง</option><option value="นางสาว">นางสาว</option></select></div>
                  <div className="col-span-1 md:col-span-1"><label className="block text-gray-700 font-bold mb-3">ชื่อ <span className="text-rose-500">*</span></label><input type="text" name="firstName" defaultValue={editingItem.firstName} className="w-full border-2 border-gray-100 bg-gray-50/50 rounded-2xl p-4" required /></div>
                  <div className="col-span-1 md:col-span-1"><label className="block text-gray-700 font-bold mb-3">นามสกุล <span className="text-rose-500">*</span></label><input type="text" name="lastName" defaultValue={editingItem.lastName} className="w-full border-2 border-gray-100 bg-gray-50/50 rounded-2xl p-4" required /></div>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <div><label className="block text-gray-700 font-bold mb-3">💼 ตำแหน่ง <span className="text-rose-500">*</span></label><select name="position" defaultValue={editingItem.position} className="w-full border-2 border-gray-100 bg-gray-50/50 rounded-2xl p-4" required><option value="ครูผู้ช่วย">ครูผู้ช่วย</option><option value="ครู">ครู</option></select></div>
                  <div><label className="block text-gray-700 font-bold mb-3">🏅 วิทยฐานะ <span className="text-rose-500">*</span></label><select name="level" defaultValue={editingItem.level} className="w-full border-2 border-gray-100 bg-gray-50/50 rounded-2xl p-4" required><option value="ไม่มี">ไม่มีวิทยฐานะ</option><option value="ชำนาญการ">ชำนาญการ</option><option value="ชำนาญการพิเศษ">ชำนาญการพิเศษ</option><option value="เชี่ยวชาญ">เชี่ยวชาญ</option></select></div>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <div><label className="block text-gray-700 font-bold mb-3">🏫 โรงเรียน <span className="text-rose-500">*</span></label><input type="text" name="school" defaultValue={editingItem.school} className="w-full border-2 border-gray-100 bg-gray-50/50 rounded-2xl p-4" required /></div>
                  <div><label className="block text-gray-700 font-bold mb-3">🌐 เครือข่ายการศึกษา <span className="text-rose-500">*</span></label><select name="network" defaultValue={editingItem.network} className="w-full border-2 border-gray-100 bg-gray-50/50 rounded-2xl p-4" required><option value="กรมหลวงชุมพรฯ">กรมหลวงชุมพรฯ</option><option value="แกลงบูรพา">แกลงบูรพา</option><option value="เขาชะเมา">เขาชะเมา</option><option value="วังจันทร์">วังจันทร์</option><option value="สุนทรภู่">สุนทรภู่</option><option value="อริยมงคล">อริยมงคล</option></select></div>
                </div>
                <div><label className="block text-gray-700 font-bold mb-3">📱 เบอร์โทรศัพท์ <span className="text-rose-500">*</span></label><input type="tel" name="phone" defaultValue={editingItem.phone} maxLength="10" className="w-full border-2 border-gray-100 bg-gray-50/50 rounded-2xl p-4" required /></div>
                <div className="pt-6"><button type="submit" className="w-full bg-gradient-to-r from-teal-500 to-teal-400 text-white font-extrabold text-xl py-5 rounded-2xl shadow-xl hover:-translate-y-1 transition-all">💾 บันทึกการแก้ไขข้อมูล</button></div>
              </form>
            </div>
          </div>
        );
      };

      const renderSearchView = () => {
        // แก้ไขให้ค้นหาจาก "ชื่อโรงเรียน" เป็นหลัก
        const filteredData = appData.filter(item => item.school.includes(searchTerm));
        const handleEditClick = (item) => { setEditingItem(item); setVerifyPhoneInput(''); setVerifyError(''); setVerifyModalOpen(true); };

        return (
          <div className="max-w-4xl mx-auto px-4 animate-fade-in">
             <button onClick={() => setCurrentView('home')} className="mb-6 text-teal-600 font-semibold flex items-center gap-2 hover:bg-teal-50 px-5 py-2.5 rounded-xl"><span className="text-xl">⬅️</span> กลับหน้าหลัก</button>
            <div className="bg-white rounded-[2rem] shadow-xl p-6 md:p-10 border border-teal-50">
              <div className="text-center mb-10"><h2 className="text-3xl font-extrabold text-teal-700 mb-3">ตรวจสอบรายชื่อ / แก้ไขข้อมูล</h2><p className="text-gray-500">พิมพ์ "ชื่อโรงเรียน" เพื่อค้นหาข้อมูล</p></div>
              <div className="relative mb-10 max-w-xl mx-auto"><input type="text" className="block w-full pl-6 pr-6 py-4 bg-gray-50/50 border-2 border-teal-100 rounded-full focus:bg-white focus:ring-4 text-lg font-medium shadow-sm" placeholder="พิมพ์ชื่อโรงเรียน..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} /></div>
              <div className="overflow-x-auto rounded-2xl border border-gray-100 shadow-sm"><table className="w-full text-left text-sm md:text-base border-collapse"><thead className="bg-teal-50 text-teal-800"><tr><th className="px-6 py-4 border-b font-bold">🏫 โรงเรียน</th><th className="px-6 py-4 border-b font-bold hidden md:table-cell">🌐 เครือข่าย</th><th className="px-6 py-4 border-b font-bold">💼 ตำแหน่ง</th><th className="px-6 py-4 border-b font-bold">📱 เบอร์โทรศัพท์</th><th className="px-6 py-4 border-b font-bold text-center">แก้ไข</th></tr></thead><tbody className="divide-y divide-gray-50">
                    {searchTerm === '' ? (<tr><td colSpan="5" className="px-6 py-12 text-center text-gray-400 bg-gray-50/50 font-medium">กรุณาพิมพ์เพื่อค้นหา...</td></tr>) : filteredData.length > 0 ? (filteredData.map((data, index) => (
                        <tr key={index} className="hover:bg-teal-50/50 transition-colors"><td className="px-6 py-4 font-bold text-gray-700">{data.school}</td><td className="px-6 py-4 text-gray-600 hidden md:table-cell">{data.network}</td><td className="px-6 py-4 text-gray-600">{data.position}</td><td className="px-6 py-4 text-gray-600 font-mono tracking-wide">{data.phone}</td><td className="px-6 py-4 text-center"><button onClick={() => handleEditClick(data)} className="bg-orange-100 text-orange-600 w-10 h-10 rounded-full mx-auto shadow-sm">🔧</button></td></tr>
                      ))) : (<tr><td colSpan="5" className="px-6 py-12 text-center text-rose-400 bg-rose-50/50">❌ ไม่พบข้อมูล</td></tr>)}
                  </tbody></table></div>
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen bg-[#fdfaf6] font-sans relative">
          {isInitializing && renderLoadingOverlay("กำลังเชื่อมต่อฐานข้อมูล...")}
          {isProcessing && renderLoadingOverlay("กำลังบันทึกข้อมูล...")}
          {renderCustomModal()}
          {renderVerifyPhoneModal()}
          {renderHeader()}
          <main className="pb-12 min-h-[50vh]">
            {!isInitializing && currentView === 'home' && renderHomeView()}
            {!isInitializing && currentView === 'register' && renderRegisterView()}
            {!isInitializing && currentView === 'search' && renderSearchView()}
            {!isInitializing && currentView === 'edit' && renderEditView()}
          </main>
          {renderFooter()}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
